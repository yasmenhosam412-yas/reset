<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    GitHub Pages (project site): build with a matching base path, e.g.
      flutter build web --base-href /REPO_NAME/
    Then copy this file for SPA routing (so refresh/deep links work):
      PowerShell: Copy-Item build\web\index.html build\web\404.html
      bash:       cp build/web/index.html build/web/404.html
    Deploy the contents of build/web/ to the gh-pages branch (or GitHub Actions).

    User site (username.github.io root): use --base-href /
  -->
  <base href="/reset/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="new_project">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="new_project">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>new_project</title>
  <link rel="manifest" href="manifest.json">

  <style>body { margin: 0; }</style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
